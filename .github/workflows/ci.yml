name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per branch/PR; new pushes cancel the old run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  # Fast guard: the pinned vcpkg submodule and the manifest baseline must not drift.
  vcpkg-baseline:
    name: vcpkg baseline invariant
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (gitlink only — no submodule contents needed)
        uses: actions/checkout@v4
      - name: Submodule SHA must equal builtin-baseline
        shell: bash
        run: |
          submodule_sha="$(git rev-parse 'HEAD:vcpkg')"
          baseline="$(jq -r '.["builtin-baseline"]' vcpkg.json)"
          echo "submodule gitlink   : $submodule_sha"
          echo "vcpkg.json baseline : $baseline"
          if [ "$submodule_sha" != "$baseline" ]; then
            echo "::error file=vcpkg.json::vcpkg submodule SHA ($submodule_sha) != builtin-baseline ($baseline). Bump them together in one commit."
            exit 1
          fi

  lint:
    name: Format & lint configs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (no submodules — clang-format needs only the sources)
        uses: actions/checkout@v4

      - name: Install clang-format 18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: clang-format — all tracked C/C++ sources must be formatted
        shell: bash
        run: |
          set -euo pipefail
          git ls-files -z '*.cpp' '*.hpp' '*.h' '*.cc' '*.cxx' '*.hxx' '*.inl' \
            | xargs -0 -r clang-format-18 --dry-run --Werror

      - name: Boundary — no spdlog/fmt types in public engine headers
        shell: bash
        run: |
          set -euo pipefail
          # Task 0.2.4's deliverable: "no spdlog types in public headers". vcpkg installs every
          # dependency into ONE flat include dir that lands on the compile line (-isystem) of any
          # target linking any vcpkg package, so linking spdlog PRIVATE cannot enforce this —
          # a leaked #include would still compile. This grep is the actual enforcement.
          # Matches backend includes and qualified uses; 'format'/'std::format' do NOT match.
          #
          # The namespace arm is spelled (^|[^a-zA-Z0-9_]) and NOT \b on purpose — see the enkiTS
          # step below for the full reasoning. In short: `git grep -E` delegates to the SYSTEM POSIX
          # ERE engine, and \b is a GNU extension that BSD libc (macOS) degrades to a literal 'b',
          # making the arm silently vacuous there. This step shipped with \b at 0.2.4 and was fixed
          # once 0.2.5 discovered it. It was never broken in CI (this job runs on Linux/glibc), but
          # it could not fire for anyone running it locally on a Mac, and it would have rotted to a
          # no-op — green — the day the runner image changed.
          if git grep -n -E '(#[[:space:]]*include[[:space:]]*<(spdlog|fmt)/)|((^|[^a-zA-Z0-9_])(spdlog|fmt)::)' \
               -- 'engine/*/include/*'; then
            echo "::error::A third-party logging backend leaked into a public engine header (task 0.2.4; docs/04 boundary rule). Keep spdlog/fmt inside engine/core/src/log.cpp."
            exit 1
          fi

      - name: Boundary — no GLM outside the math backend
        shell: bash
        run: bash .github/scripts/check-math-boundary.sh

      - name: Boundary — no enkiTS types in public engine headers
        shell: bash
        run: |
          set -euo pipefail
          # Task 0.2.5's boundary: "no enkiTS type in a public engine header". Both spellings are
          # real and must be caught. enkiTS installs its headers to include/enkiTS/ and its exported
          # target puts include/enkiTS (not include/) on a consumer's compile line, so:
          #   <TaskScheduler.h>          resolves only for a target linking enkiTS::enkiTS;
          #   <enkiTS/TaskScheduler.h>   resolves for ANY target linking ANY vcpkg package, because
          #                              vcpkg installs every port into ONE flat include/ root that
          #                              lands on that target's compile line (-isystem) — risk R12.
          # The second is why linking enkiTS PRIVATE cannot enforce this on its own: a leaked
          # #include would still compile in tests/. This grep reaches where the compile-time probe
          # (tests/jobs_boundary_probe.cpp) cannot.
          #
          # The namespace arm is spelled (^|[^a-zA-Z0-9_])enki:: and NOT \benki:: on purpose.
          # `git grep -E` delegates to the SYSTEM POSIX ERE engine: glibc accepts \b as a GNU
          # extension, but BSD libc (macOS) does not — there \b degrades to a literal 'b', so
          # \benki:: only ever matches "benki::" and the arm is silently vacuous. The lint job runs
          # on Linux, where \b would work, but a guard that no-ops the moment anyone runs it locally
          # or the runner changes is exactly the silent-green rot this task's probes exist to
          # prevent. The bracket form is an exact equivalent and is portable everywhere.
          # (Verified 2026-07-15: it catches `enki::` at line start / after a space, `<`, or `(`,
          # and rejects `benki::`, `myenki::`, `x_enki::`, and the word "enkiTS" in prose — which
          # jobs.hpp's comments legitimately use.)
          if git grep -n -E '(#[[:space:]]*include[[:space:]]*<enkiTS/)|(#[[:space:]]*include[[:space:]]*<(TaskScheduler|TaskScheduler_c|LockLessMultiReadPipe)\.h>)|((^|[^a-zA-Z0-9_])enki::)' \
               -- 'engine/*/include/*'; then
            echo "::error::enkiTS leaked into a public engine header (task 0.2.5; docs/04 boundary rule). Keep enkiTS inside engine/core/src/jobs.cpp."
            exit 1
          fi

      - name: Boundary — no SDL types in public engine headers
        shell: bash
        # Task 0.3.1's boundary: "no SDL type in a public engine header". A plain grep (the
        # spdlog/enkiTS precedent above) does NOT work for SDL: SDL has no namespace, so a real SDL
        # identifier (SDL_Init, SDL_GPU, SDL_Window, ...) is textually indistinguishable from that
        # same identifier cited in a documentation comment — and this codebase already cites exact
        # SDL identifiers in prose for traceability (e.g. math.hpp's "SDL_GPU's documented NDC",
        # time.hpp's "SDL_GetTicks", this task's own context.hpp citing "SDL_init.h:81"). A bare
        # `(^|[^a-zA-Z0-9_])SDL_` grep fires on ALL of those — verified during 0.3.1 implementation:
        # it already matched on main before this task added a single line, entirely from pre-existing
        # math/time comments, which would have made this step permanently red. spdlog/enkiTS don't
        # have this problem because `spdlog::`/`enki::`/`TaskScheduler.h` essentially never appear in
        # first-party prose. check-platform-boundary.sh strips `//` line comments before applying the
        # identifier check (mirroring check-math-boundary.sh's script-not-one-liner precedent for a
        # boundary that needs more nuance than a single grep line), so a real leak (an actual
        # `#include <SDL3/...>` or an actual `SDL_Window*` declaration) still fails the build, while a
        # documentation citation does not.
        run: bash .github/scripts/check-platform-boundary.sh

      - name: Boundary — no SDL_GPU outside the rhi backend
        shell: bash
        # Task 0.4.5 (ADR-002, the sacred wrapper): SDL_GPU is reachable from exactly one TU,
        # engine/rhi/src/sdl_gpu_backend.cpp. Like check-platform-boundary.sh this is a script, not a
        # one-line grep, because SDL has no namespace and this codebase cites SDL_GPU identifiers in
        # first-party comments -- the script strips `//` comments before the identifier check. Unlike
        # the platform guard it scans engine/ + runtime/ SOURCES (not just public headers) with a
        # single allowlisted file: the sacred-wrapper invariant governs .cpp too, not only headers.
        run: bash .github/scripts/check-rhi-boundary.sh

  build:
    name: ${{ matrix.name }}
    needs: vcpkg-baseline        # don't spend build minutes if the pin is broken
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false            # one OS failing must not cancel the others
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-24.04
            preset: linux
            vcpkg_cache: ~/.cache/vcpkg/archives
            shadercross_cache: ~/.cache/aero-engine/shadercross  # task 0.4.3
            ctest_launcher: xvfb-run -a  # D6: GPU device creation needs a REAL video driver (x11)
            require_gpu: 1               # task 0.4.2 (D7): a missing GPU device is a FAILURE, not a skip
          - name: macOS (AppleClang)
            os: macos-15
            preset: macos
            vcpkg_cache: ~/.cache/vcpkg/archives
            shadercross_cache: ~/.cache/aero-engine/shadercross  # task 0.4.3
            ctest_launcher: ""
            require_gpu: 1
          - name: Windows (MSVC)
            os: windows-2022
            preset: windows
            vcpkg_cache: ~/AppData/Local/vcpkg/archives
            shadercross_cache: ~/AppData/Local/aero-engine/shadercross  # task 0.4.3
            ctest_launcher: ""
            require_gpu: 1
    steps:
      - name: Checkout with vcpkg submodule
        uses: actions/checkout@v4
        with:
          submodules: true         # required — the toolchain lives in the submodule

      - name: Install SDL3 system dependencies (Linux)
        if: runner.os == 'Linux'
        # SDL3's Linux build deps for the enabled x11 + wayland features (X11 extension libs,
        # wayland-protocols, libdecor, egl, ibus — per SDL3 README-linux), plus autotools + libltdl-dev
        # that vcpkg needs to build transitive deps (SDL3 → dbus[systemd] → libsystemd → libxcrypt, libmount, …).
        # task 0.4.2: mesa-vulkan-drivers + libvulkan1 give SDL_GPU's Vulkan backend a software ICD
        # (lavapipe) on these GPU-less runners — the standard headless-GPU CI pattern; xvfb gives D6's
        # required REAL video driver (dummy has no Vulkan/Metal surface support) and a displayable
        # window for the tier-2 swapchain tests.
        # task 1.1.1: libclang-18-dev + llvm-18-dev give tools/reflect-gen system libclang (the C API +
        # headers + the CMake config packages) at the AERO_LLVM_ROOT default (/usr/lib/llvm-18) — no
        # env override needed on this lane.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxft-dev \
            libwayland-dev wayland-protocols libdecor-0-dev libxkbcommon-dev \
            libegl1-mesa-dev libibus-1.0-dev \
            autoconf autoconf-archive automake libtool libltdl-dev \
            clang-tidy-18 libclang-18-dev llvm-18-dev \
            mesa-vulkan-drivers libvulkan1 xvfb

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        # task 1.1.1: tools/reflect-gen's system-libclang discovery hints brew --prefix llvm@18
        # (AERO_LLVM_ROOT's macOS default) — idempotent; the macos-15 image may already carry it.
        run: brew install llvm@18

      - name: Install LLVM 18 (Windows)
        if: runner.os == 'Windows'
        # task 1.1.1: pinned to match the other two lanes' LLVM 18 line (D2). AERO_LLVM_ROOT is
        # exported for the configure steps (plan C.2) as belt-and-suspenders on top of the
        # $ENV{ProgramFiles}/LLVM default, in case choco's install location ever drifts from it.
        # --allow-downgrade: the windows-2022 runner ships a newer LLVM preinstalled (20.1.8 as of
        # 2026-07), so choco refuses to install the pinned older 18.1.8 over it without this flag
        # (choco's own error names it). This is the plan's pre-decided Windows contingency
        # (D10/§S6) -- keep the LLVM 18 pin rather than let the Windows lane parse with a different
        # frontend than Linux/macOS and the repo's own clang-tidy-18.
        shell: bash
        run: |
          choco install llvm --version=18.1.8 -y --allow-downgrade
          echo "AERO_LLVM_ROOT=C:\Program Files\LLVM" >> "$GITHUB_ENV"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1   # optional hardening: pin to a full commit SHA (§5 step 7)
        with:
          arch: x64

      - name: Remove MSYS link shadow (Windows)
        if: runner.os == 'Windows'
        # Git Bash ships /usr/bin/link, which shadows MSVC's link.exe under
        # shell:bash (documented in the ilammy/msvc-dev-cmd README). 0.1.4
        # adds the repo's first linked target, so the shadow can bite starting
        # here. -f: succeed even if a future image drops the file.
        shell: bash
        run: rm -f /usr/bin/link

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ matrix.vcpkg_cache }}
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Cache shader toolchain (task 0.4.3)
        uses: actions/cache@v4
        with:
          path: ${{ matrix.shadercross_cache }}
          key: shadercross-${{ runner.os }}-1ca46e0ef7a9
          # No restore-keys: a SHA bump must rebuild the toolchain from scratch, never resurrect a
          # stale one under a partial key match.

      - name: Configure & build — Debug
        shell: bash                 # -eo pipefail: a failed configure aborts before build
        run: |
          cmake --preset ${{ matrix.preset }}-debug
          cmake --build --preset ${{ matrix.preset }}-debug

      - name: clang-tidy — first-party TUs (Linux, reuses the Debug compile DB)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Only .cpp are translation units; the compile DB from linux-debug carries
          # their exact flags. profiler.hpp is linted transitively via profiler_test.cpp.
          git ls-files -z '*.cpp' \
            | xargs -0 -r -n1 clang-tidy-18 -p build/linux-debug --warnings-as-errors='*'

      - name: Test — Debug (ASan/UBSan)
        shell: bash
        env:
          AERO_REQUIRE_GPU: ${{ matrix.require_gpu }}   # a missing GPU is a FAILURE, not a skip (spec D7)
          # Evidence-gated LSan suppressions (spec D16, exercised by PR #16's first GPU run): SDL's
          # x11 video-init and Vulkan-probe internals leak per init cycle; tests/lsan.supp names the
          # four observed third-party frames. Linux-only — the one lane where LSan runs; empty
          # elsewhere. First-party leak detection stays fully on.
          LSAN_OPTIONS: ${{ runner.os == 'Linux' && format('suppressions={0}/tests/lsan.supp', github.workspace) || '' }}
        run: ${{ matrix.ctest_launcher }} ctest --preset ${{ matrix.preset }}-debug

      - name: Configure & build — Release
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }}-release
          cmake --build --preset ${{ matrix.preset }}-release

      - name: Test — Release
        shell: bash
        env:
          AERO_REQUIRE_GPU: ${{ matrix.require_gpu }}   # a missing GPU is a FAILURE, not a skip (spec D7)
        run: ${{ matrix.ctest_launcher }} ctest --preset ${{ matrix.preset }}-release
